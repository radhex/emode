        cssClass: col-sm-2
        exchange:
    create_at:
        label: 'eprog.manager::lang.date'
        oc.commentPosition: ''
        span: storm
        type: datepicker
        mode: date
        format: Y-m-d
        default: now
        cssClass: col-sm-2
    vat_at:
        label: 'eprog.manager::lang.make_at'
        oc.commentPosition: ''
        span: storm
        type: datepicker
        mode: date
        format: Y-m-d
        default: now
        cssClass: col-sm-2
    off:
        label: 'OFF'
        size: large
        oc.commentPosition: ''
        span: storm
        type: switch
        default: true
        cssClass: col-sm-1
    lp:
        label: LP
        oc.commentPosition: ''
        span: left
        type: text
        attributes: tabindex:1
        cssClass: col-sm-1
    prefix:
        label: 'eprog.manager::lang.prefix'
        oc.commentPosition: ''
        span: storm
        type: text
        attributes: tabindex:1
        cssClass: col-sm-1
    nr:
        label: 'eprog.manager::lang.nr_doc'
        oc.commentPosition: ''
        span: storm
        type: text
        attributes: tabindex:1
        cssClass: col-sm-1
    selltype:
        label: 'eprog.manager::lang.type_doc'
        oc.commentPosition: ''
        span: storm
        type: dropdown
        attributes: tabindex:1
        cssClass: col-sm-1
    currency:
        label: 'eprog.manager::lang.currency'
        oc.commentPosition: ''
        span: storm
        type: dropdown
        emptyOption: 'eprog.manager::lang.select_dropdown'
        cssClass: col-sm-2
    exchange:
        label: 'eprog.manager::lang.exchange'
        oc.commentPosition: ''
        span: storm
        type: text
        cssClass: col-sm-2
        dependsOn: currency
        trigger:
            action: hide
            field: currency
            condition: value[PLN]
    tax_form:
        label: 'eprog.manager::lang.tax_form'
        oc.commentPosition: ''
        span: storm
        type: dropdown
        emptyOption: 'eprog.manager::lang.select_dropdown'
        cssClass: col-sm-2
    nr_ksef:
        label: 'eprog.manager::lang.ksef.nr'
        oc.commentPosition: ''
        span: storm
        type: partial
        path: ksef
        cssClass: col-sm-3

