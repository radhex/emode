<p>
    <?php

        function addGetParamToUrl(&$url, $varName, $value)
        {
            // is there already an ?
            if (strpos($url, "?"))
            {
                $url .= "&" . $varName . "=" . $value; 
            }
            else
            {
                $url .= "?" . $varName . "=" . $value;
            }

            return $url;
        }

        $url = 'eprog/manager/mailing';
        if(Input::segment(7) > 0)
        $url = addGetParamToUrl($url,"page",Input::segment(7));
        if(Input::has("term"))
        $url = addGetParamToUrl($url,"term",Input::get("term"));


    ?>
    <a href="<?= Backend::url($url) ?>" class="btn btn-default oc-icon-chevron-left">
        <?= e(trans('eprog.manager::lang.return')) ?>
    </a>
</p>
