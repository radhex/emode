	$(function() {

		if (!target) return;

		    mutations.forEach(function (mutation) {
		        if (mutation.attributeName === 'class') {

		            if ($activeTab.length) {

		            	bodyHeight(document.getElementById('invoice'));


		            }
		        }
		    });
		});

		observer.observe(target, {
		    subtree: true,
		    attributes: true
		});

	
 		 	 	  	 		 	
	});


</script>
