<script>
    var kor = <?= $this->kor;?>;    
    var segment = '<?= Input::segment(5);?>';   



    $(function() { 

        $('#save').click(function(e){
        
              valueValidate();

        });


        if($('#Form-field-Accounting-currency').val() == "PLN"){             
            $('#Form-field-Accounting-exchange').prop('readonly', true);
            $('#Form-field-Accounting-exchange').val("1.0000");          
        }

        $('#Form-field-Accounting-mode').on('select2:select', function(e) {
          
            if($(this).val() == "0"){
                $('.sell').show();
                $('.buy').hide();
            }
            else{
               $('.sell').hide();
               $('.buy').show();
            }
         
        });


        $('#Form-field-Accounting-selltype').on('select2:select', function(e) {

            if($(this).val() == "1") $('#Form-field-Accounting-client_name').val("Sprzedaż detaliczna");

        });


    });



    $('#Form-field-Accounting-currency').on('select2:select', function(e) {
      
        if($(this).val() == "PLN"){
            $('#Form-field-Accounting-exchange').val("1.0000");
            $('#Form-field-Accounting-exchange').prop('readonly', true);
        }
        else{
            $('#Form-field-Accounting-exchange').val("");
            $('#Form-field-Accounting-exchange').prop('readonly', false);
        }
     
    });



    $('#Form-field-Accounting-exchange').on('paste input', function (e) {
            
        inputCourse(this, e);
        
    });

    $('#Form-field-Accounting-exchange').on('focusout', function (e) {
            
        inputCourseOut(this, e);
        
    });


    $('#Form-field-Accounting-exchange').on('focusin', function (e) {
            
        inputCourseIn(this, e);
        
    });






</script>
