<button type="button" id="scedig" value="dodaj" class="btn btn-secondary btn-sm oc-icon-users"  style="height:32px;margin-top:22px;margin-left:-3px;padding-top:5px;padding-right:14px"><?= e(trans('eprog.manager::lang.ksef.cedig')) ?></button>

<script>
$(function() {   

		$("#scedig").click(function() {
			

			$.ajax({
			        type: "POST",
			        data:"_token=<?= csrf_token() ?>",
			        url: '/<?= config('cms.backendUri') ?>/eprog/manager/feed/cedig/' + $('#Form-field-Order-seller_nip').val(),

			        success: function(res) {
			        	
			        	data = JSON.parse(res);		
			        	if(data.name) $('#Form-field-Order-seller_name').val(data.name);
			        	if(data.adres1) $('#Form-field-Order-seller_adres1').val(data.adres1);
			        	if(data.adres2) $('#Form-field-Order-seller_adres2').val(data.adres2);
			        	if(data.country) $('#Form-field-Order-seller_country').val(data.country).trigger('change');

			                   
			        },
			        error: function(xhr,status,error) {
			             console.log(error);
			        }

			});
			

		});
			 	  	 		 	
});
</script>
