scopes:
    user_id:
        # Filter name
        label: eprog.manager::lang.user
        # Model Class name
        modelClass: RainLab\User\Models\User
        # Model attribute to display for the name
        nameFrom: surname
        # Filter scope
        scope: filterByUser

    status:
        label: Status
        type: group
        conditions: status_id in (:filtered)

    start:
        label: eprog.manager::lang.start
        type: daterange
        conditions: start >= ':after' AND start <= ':before'
        
    stop:
        label: eprog.manager::lang.stop
        type: daterange
        conditions: start >= ':after' AND start <= ':before'







