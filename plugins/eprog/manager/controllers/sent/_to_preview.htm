<?php
use Eprog\Manager\Classes\Util;

	$emails = explode(",",$value);

	$l = 0;
?>
<span style="color:#999;"><?= e(trans('eprog.manager::lang.to'))?>:
<?php foreach($emails as $email): ?>
<?php

	$name = trim(strip_tags(trim($email)));
	if(preg_match("/@/i",$name))
	$adress = $name;
	else
	$adress  = Util::getBetween($email, "<",">");

	$l++;
?>
</span><a href="javascript:" style="color:var(--mcolor);" onmousedown="clickMail(this,'<?= $adress  ?>')" title="<?= $adress ?>"><?= $name ?></a><?php if($l != sizeof($emails)): ?>, <?php endif ?>
<?php endforeach ?>
