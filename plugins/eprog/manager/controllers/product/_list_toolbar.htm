<script>

    var change = false;

    $(document).on('ajaxSetup', function(event, context) {

        if (context.handler === 'onExport' && context.options.confirm) {

            let selectedIds = [];
            $('.control-list tbody input[type="checkbox"]:checked').each(function () {
                selectedIds.push($(this).val());
            });
            if(selectedIds.length > 0){
                console.log(selectedIds);
                context.options.confirm = '<?= e(trans('eprog.manager::lang.export_xml_checked_confirm')) ?>';
                context.options.data.checked = selectedIds;               
            }
        }

    });


</script>
