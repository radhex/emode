<script>



    $(function() { 

        $('#save').click(function(e){
            const checkboxes = $('#P_540, #P_55, #P_56, #P_560, #P_58');
            const kwota = $('#P_54').val().trim();
            const checkedCount = checkboxes.filter(':checked').length;

            if (checkedCount > 1) {
                $.oc.flashMsg({
                    text: '<?= e(trans('eprog.manager::lang.other_msg2')) ?>',
                    class: 'error',
                    interval: 3
                });
                return false;
            }

            if (checkedCount === 1 && kwota === '') {
                $.oc.flashMsg({
                    text: '<?= e(trans('eprog.manager::lang.other_msg1')) ?>',
                    class: 'error',
                    interval: 3
                });
                return false;
            }

            if (kwota !== '' && checkedCount === 0) {
                $.oc.flashMsg({
                    text: '<?= e(trans('eprog.manager::lang.other_msg1')) ?>',
                    class: 'error',
                    interval: 3
                });
                return false;
            }

            const futureCheckbox = $('#P_59');
            const futureAmount = $('#P_60').val().trim();
            const futureType = $('#P_61').val().trim();

            if (futureCheckbox.is(':checked') || futureAmount !== '' || futureType !== '') {
                if (!futureCheckbox.is(':checked') || futureAmount === '' || futureType === '') {
                    $.oc.flashMsg({
                        text: '<?= e(trans('eprog.manager::lang.other_msg3')) ?>',
                        class: 'error',
                        interval: 3
                    });
                    return false;
                }
            }

            if (futureCheckbox.is(':checked') && kwota == '') {
                    $.oc.flashMsg({
                        text: '<?= e(trans('eprog.manager::lang.other_msg4')) ?>',
                        class: 'error',
                        interval: 3
                    });
                    return false; 
            }

        });
        
        <?php if($jpk->jpk_at) : ?>
        protectFromEdit();
        $("#save").hide();
        <?php endif ?>


        $("#Form-field-Jpk-created_at").attr("readonly", true);

        $("#Form-field-Jpk-created_at").css("background-color","#eee !important");
        $("#Form-field-Jpk-created_at").css("color","#999");
        $("#Form-field-Jpk-created_at").css("cursor","not-allowed");

        $('#return').on('click', function(e) {
            e.preventDefault();

            var nip = '<?= $jpk->nip ?>';
            var url = '<?= Backend::url('eprog/manager/jpk') ?>?&nip=' + nip;
            window.location.href = url; 
        });

        $('#Form-field-Jpk-correct').on('change', function(e) {
          
                if($('#Form-field-Jpk-correct').is(':checked')){
                    xml = $('#Form-field-Jpk-xml').val();
                    xml = xml.replace(
                        /(<CelZlozenia[^>]*>)[12](<\/CelZlozenia>)/,
                        '$12$2'
                    );
                    $('#Form-field-Jpk-xml').val(xml);
                }
                else{
                    xml = $('#Form-field-Jpk-xml').val();
                    xml = xml.replace(
                        /(<CelZlozenia[^>]*>)[12](<\/CelZlozenia>)/,
                        '$11$2'
                    );
                    $('#Form-field-Jpk-xml').val(xml);
                }
        });

   
    });


    function onJpkSend(data){

        $('#jpkSend').hide();
        $('#jpkUpo').show();
        $('#jpkUpoFile').show();
        $('#save').hide();
        $.oc.flashMsg({text: '<?= e(trans('eprog.manager::lang.jpksend_scuccess')) ?>', 'class': 'success', 'interval': 4})
        protectFromEdit();
    
    }

</script>
