<style>


    .spinner-toolbar {

        border-radius: 50%;
        animation: spin 1s linear infinite;

        /* Ustawienia dla toolbar */
        margin-left: 10px; /* oddziel od przycisków */
        vertical-align: middle;
        display:none;
      
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }


</style>

<script>



    $(document).on('ajaxPromise', '[data-request]', function(e, context) {

        if(context.options.data.action == "sendmultiple"){ 
            $("body").css('pointer-events', "none");
            $("#spinner-toolbar").css("display","inline-block"); 

        }
  
    });

    $(document).on('ajaxDone ajaxFail', '[data-request]', function(e, context) {

         if(context.options.data.action == "sendmultiple"){
             $("body").css('pointer-events', "auto");
             $("#spinner-toolbar").hide();     
         }



    });

    $(document).on('ajaxSetup', function(event, context) {

        if (context.handler === 'onExport' && context.options.confirm) {

            let selectedIds = [];
            $('.control-list tbody input[type="checkbox"]:checked').each(function () {
                selectedIds.push($(this).val());
            });
            if(selectedIds.length > 0){
                console.log(selectedIds);
                context.options.confirm = '<?= e(trans('eprog.manager::lang.export_xml_checked_confirm')) ?>';
                context.options.data.checked = selectedIds;               
            }
        }

    });


    $(function() { 




    });




</script>
