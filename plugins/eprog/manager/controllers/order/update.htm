<script>

    var change = false;
    var ksefNumber = '<?= $order->ksefNumber ?>';

    $(function() { 

        if(ksefNumber)
            protectFromEdit();

        $('#save').click(function(e){
       
              valueValidate();

        });

        if(!$('#Form-field-Order-_addbuyer').is(':checked'))
        $('#Form-field-Order-_addbuyer_type').val(3).trigger('change');
        
        changeProtect();

        $('#ksefSend').click(function(e){

              valueValidate();

              if(change){
                  $.oc.flashMsg({text: 'Zapisz zmiany przed wyslaniem', 'class': 'error', 'interval': 2});
                  e.preventDefault();
                  e.stopPropagation();
              }

        });

        if($('#Form-field-Order-type').val() == 3)
            $('#Form-field-Order-_advance_nr-group').show();
        else
            $('#Form-field-Order-_advance_nr-group').hide();


        if($('#Form-field-Order-_addbuyer_role').val() != "10"){             
            $('#Form-field-Order-_addbuyer_role_desc').prop('readonly', true);        
        }

        if($('#Form-field-Order-_addbuyer_type').val() == "3"){             
            $('#Form-field-Order-_addbuyer_nip').prop('readonly', true);        
        }

        if($('#Form-field-Order-buyer_type').val() == "3"){             
            $('#Form-field-Order-buyer_nip').prop('readonly', true);   
            $('#Form-field-Order-buyer_nip').val("");     
        }


        if($('#Form-field-Order-currency').val() == "PLN"){             
            $('#Form-field-Order-exchange').prop('readonly', true);
            $('#Form-field-Order-exchange').val("1.0000");          
        }

        if($('#Form-field-Order-_wu').val() == "PLN"){             
            $('#Form-field-Order-_ku').prop('readonly', true);
            $('#Form-field-Order-_ku').val("1.0000");          
        }


        $('#Form-field-Order-_bank_nr').attr('maxlength','32');
        $('#Form-field-Order-_pay_part').prop('readonly', true);

        $('#Form-field-Order-_pay_part').val(number_format($('#Form-field-Order-_pay_part').val().replace(",",".").replace(/\s+/g, ''),2,","," "));


        $('#DatePicker-formPayDate-date-_pay_date').prop('disabled', true);

        if($('#Form-field-Order-_pay_info').val() != "")
            $('#DatePicker-formPayDate-date-_pay_date').prop('disabled', false);

        if($('#Form-field-Order-_pay_info').val() == 1)
            $('#Form-field-Order-_pay_part').prop('readonly', false);
                

    });



    $('#Form-field-Order-_addbuyer_type').on('select2:opening', function (e) {
        if( $(this).attr('readonly') == 'readonly') { 
            e.preventDefault();
            $(this).select2('close'); 
            return false;
        }
    });

    $('#Form-field-Order-_addbuyer').click(function(){

       if(!$(this).is(':checked')){
           $('#Form-field-Order-_addbuyer_type').val(3).trigger('change');
        }
    
    }); 


    marza_prev = 0;
    $('#Form-field-Order-_marza-group').click(function(){
       
        marza_prev = $(this).find("select").val();

    }); 
        
    $('#Form-field-Order-_marza').on('select2:select', function(e) {
      
            marza = false;
            $(".vat").each(function(index) {

                if($(this).text() == "marża") marza = true;
            
            });
            if($(this).val() == "" && marza){

                $.oc.flashMsg({text: '<?= trans('eprog.manager::lang.ksef.marza_msg2') ?>', 'class': 'error', 'interval': 2});
                $(this).val(marza_prev).trigger('change');
     
            }

    });

    $('#Form-field-Order-buyer_type').on('select2:select', function(e) {
      
        if($(this).val() == "3"){
            $('#Form-field-Order-buyer_nip').val("");  
            $('#Form-field-Order-buyer_nip').prop('readonly', true);        
        }
        else{
            $('#Form-field-Order-buyer_nip').prop('readonly', false);  
        }
     
    });


    $('#Form-field-Order-_addbuyer_type').on('select2:select', function(e) {
      
        if($(this).val() == "3"){
            $('#Form-field-Order-_addbuyer_nip').val("");  
            $('#Form-field-Order-_addbuyer_nip').prop('readonly', true);        
        }
        else{
            $('#Form-field-Order-_addbuyer_nip').prop('readonly', false);  
        }
     
    });


    $('#Form-field-Order-_addbuyer_role').on('select2:select', function(e) {
      
        if($(this).val() == "10"){
            $('#Form-field-Order-_addbuyer_role_desc').prop('readonly', false);        
        }
        else{
            $('#Form-field-Order-_addbuyer_role_desc').val(""); 
            $('#Form-field-Order-_addbuyer_role_desc').prop('readonly', true);   
        }
     
    });


    $('#Form-field-Order-currency').on('select2:select', function(e) {
      
        if($(this).val() == "PLN"){
            $('#Form-field-Order-exchange').val("1.0000");
            $('#Form-field-Order-exchange').prop('readonly', true);
        }
        else{
            $('#Form-field-Order-exchange').val("");
            $('#Form-field-Order-exchange').prop('readonly', false);
        }
     
    });

    $('#Form-field-Order-_wu').on('select2:select', function(e) {
      
        if($(this).val() == "PLN"){
            $('#Form-field-Order-_ku').val("1.0000");
            $('#Form-field-Order-_ku').prop('readonly', true);
        }
        else{
            $('#Form-field-Order-_ku').val("");
            $('#Form-field-Order-_ku').prop('readonly', false);
        }
     
    });


    $('#Form-field-Order-_pay_info').on('select2:select', function(e) {
      
        if($(this).val() == 1)
            $('#Form-field-Order-_pay_part').prop('readonly', false);
        else{
            $('#Form-field-Order-_pay_part').val("0,00");
            $('#Form-field-Order-_pay_part').prop('readonly', true);
        }

        if($(this).val() != "")
            $('#DatePicker-formPayDate-date-_pay_date').prop('disabled', false);
        else{
            $('#DatePicker-formPayDate-date-_pay_date').val("").trigger('change');
            $('#DatePicker-formPayDate-date-_pay_date').prop('disabled', true);
        }
     
    });


    $('#Form-field-Order-exchange').on('paste input', function (e) {
            
        inputCourse(this, e);
        
    });

    $('#Form-field-Order-exchange').on('focusout', function (e) {
            
        inputCourseOut(this, e);
        
    });


    $('#Form-field-Order-exchange').on('focusin', function (e) {
            
        inputCourseIn(this, e);
        
    });


    $('#Form-field-Order-_ku').on('paste input', function (e) {
            
        inputCourse(this, e);
        
    });

    $('#Form-field-Order-_ku').on('focusout', function (e) {
            
        inputCourseOut(this, e);
        
    });


    $('#Form-field-Order-_ku').on('focusin', function (e) {
            
        inputCourseIn(this, e);
        
    });

    $('#Form-field-Order-_pay_part').on('paste input', function (e) {

        inputCurrency(this, e);

    });

    $('#Form-field-Order-_pay_part').on('focusout', function (e) {
        
        inputCurrencyOut(this, e);

    });

    $('#Form-field-Order-_pay_part').on('focusin', function (e) {
        
        inputCurrencyIn(this, e);

    });

    $('#Form-field-Order-_advance').on('paste input', function (e) {

        inputCurrency(this, e);

    });

    $('#Form-field-Order-_advance').on('focusout', function (e) {
        
        inputCurrencyOut(this, e);

    });

    $('#Form-field-Order-_advance').on('focusin', function (e) {
        
        inputCurrencyIn(this, e);

    });

    $('#Form-field-Order-_bank_nr').on('paste input', function (e) {
            
            $(this).val($(this).val().replace(/\s/g, "").replace(/[^0-9A-Z]/g,''));
 
    });


    $('#Form-field-Order-_swift').on('paste input', function (e) {
            
            $(this).val($(this).val().replace(/\s/g, "").replace(/[^0-9A-Z]/g,'').replace(/-/g,''));
    
    });


    function changeProtect(){

        $("input").each(function(index) {
              $(this).change(function(){
                change = true;
              });
        });

        $("textarea").each(function(index) {
             $(this).change(function(){
               change = true;
             });
        });

        $("select").each(function(index) {
            $(this).change(function(){
              change = true;
            });
        });

        $('.delRow').click(function(){
              change = true;
        });

        $('.addRow').click(function(){
              change = true;
        });

    }


    function onKsefSend(data){


        $('#ksefSend').hide();
        $('#ksefCorrect').show();
        $('#ksefXml').show();
        $('#ksefPdf').show();
        $('#ksefUpo').show();
        $.oc.flashMsg({text: 'Faktura została wysłana', 'class': 'success', 'interval': 4})
        protectFromEdit();
 
    }

    function onKsefDownload(data){



        $('#ksefCorrect').show();
        $('#ksefXml').show();
        $('#ksefPdf').show();
        $('#ksefUpo').show();

    
    }

</script>
