<button type="button" id="copyfirm" value="dodaj" class="btn btn-primary btn-sm oc-icon-users"  style="height:32px;margin-top:21px;margin-left:-3px;padding-top:4px;padding-right:12px"><?= e(trans('eprog.manager::lang.copyfirm')) ?></button>

<script>
$(function() {   

		$("#copyfirm").click(function() {

			        
			        	$('#Form-field-User-city').val($('#Form-field-User-firm_city').val());
			        	$('#Form-field-User-street').val($('#Form-field-User-firm_street').val());
			        	$('#Form-field-User-code').val($('#Form-field-User-firm_code').val());
			        	$('#Form-field-User-number').val($('#Form-field-User-firm_number').val());
			        	$('#Form-field-User-country').val($('#Form-field-User-firm_country').val()).trigger('change');
			        	$('#Form-field-User-region').val($('#Form-field-User-firm_region').val()).trigger('change');			

		});
			 	  	 		 	
});
</script>
