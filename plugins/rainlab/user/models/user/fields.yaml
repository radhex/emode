            label: 'rainlab.user::lang.add.comment'
            tab: 'rainlab.user::lang.add.comment'
            size: large
            oc.commentPosition: ''
            span: storm
            type: richeditor
            cssClass: col-sm-6
        info:
            label: 'rainlab.user::lang.add.info_user'
            tab: 'rainlab.user::lang.add.info'
            size: large
            oc.commentPosition: ''
            span: storm
            type: richeditor
            cssClass: col-sm-6