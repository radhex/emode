            tab: 'eprog.manager::lang.taxes'
            label: 'eprog.manager::lang.lump'
            span: storm
            type: dropdown
            cssClass: "col-sm-2 w200"
            dependsOn: tax_form
            trigger:
                action: show
                field: tax_form
                condition: value[lump]
        staff:
            label: 'eprog.manager::lang.staff'
            tab: 'eprog.manager::lang.staff'
            oc.commentPosition: ''
            span: storm
            type: checkboxlist
            cssClass: col-sm-3
        public_files:
            label: 'rainlab.user::lang.add.public_files'
            tab: 'rainlab.user::lang.add.files'
            oc.commentPosition: ''
            mode: file
            useCaption: true
            thumbOptions:
                mode: crop
                extension: auto
            span: storm
            type: Patroklo\FormWidgets\FileUpload
            cssClass: col-sm-3
        private_files:
            label: 'rainlab.user::lang.add.private_files'
            tab: 'rainlab.user::lang.add.files'
            oc.commentPosition: ''
            mode: file
            useCaption: true
            thumbOptions:
                mode: crop
                extension: auto
            span: storm
            type: Patroklo\FormWidgets\FileUpload
            cssClass: col-sm-3
