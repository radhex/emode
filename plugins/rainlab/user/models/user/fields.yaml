            tab: 'eprog.manager::lang.taxes'
            label: 'eprog.manager::lang.ksef.amount_revenue'
            span: storm
            type: text
            cssClass: "col-sm-2 w200"
        tax_form:
            tab: 'eprog.manager::lang.taxes'
            label: 'eprog.manager::lang.tax_form'
            span: left
            type: dropdown
            emptyOption: 'eprog.manager::lang.select_dropdown'
            cssClass: col-sm-3
