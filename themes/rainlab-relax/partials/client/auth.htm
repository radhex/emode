
<h4>{{ 'Autoryzacja '|_ }} {{party|raw}}</h4>

{{ form_ajax('onSubmit', {
    class: 'contact-form',

}) }}
    <input type="hidden" name="login" value="true" />
    <div style="text-align">
        <div class="row">
            <div class="col-md-3">
                <div class="form-group">
                    <label class="control-label">
                        NIP <span class="required"></span>
                    </label>
                    <input type="text" name="nip" class="form-control"  />
                </div>
            </div>
            <div class="col-md-3">
                <div class="form-group">
                    <label class="control-label">
                        {{ 'Wersja KSeF '|_ }} <span class="required"></span>
                    </label>
                    <select  name="mode" class="form-control custom-select select2"><option value="production">{{ 'Produkcja '|_ }}</option><option value="demo">Demo</option><option value="test" selected>Test</option></select>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-md-9">
                <div class="form-group">
                    <label class="control-label">
                        Token <span class="required"></span>
                    </label>
                    <input type="text" name="token" class="form-control"   size="100"/>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-md-6">

            </div>
        </div>
        <div class="row">
            <div class="col-md-6">
                <button type="submit" class="submit-button btn btn-default btn-lg">
                    {{ 'Zaloguj się '|_ }}
                </button>
            </div>
        </div>
        <br>
        <div class="row">
            <div class="col-md-6">

            </div>
        </div>
    </div>



{{ form_close() }}
