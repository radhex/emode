<script>

	$(document).ready(function() {
	    
		var initialLocaleCode = '{{activeLocale}}';	
		
		var calendarEl = document.getElementById('calendar');

		var calendar = new FullCalendar.Calendar(calendarEl, {

			headerToolbar: {
				left: 'prev,next today',
				center: 'title',
				right: 'dayGridMonth,timeGridWeek,timeGridDay,listWeek'
			},
			views: {
				listDay: { buttonText: 'list day' },
				listWeek: { buttonText: 'list week' }
			},

			initialView: 'dayGridMonth',
			initialDate: '{{ date }}',
			locale: initialLocaleCode,
			navLinks: true, // can click day/week names to navigate views
			editable: false,
			dayMaxEvents: true, // allow "more" link when too many events
			eventColor: '#68a42e',
			selectable: false,
            
			events: {
				url: '{{ url("/") }}client/feed',
			
				data: {
            				menu: '{{ mymenu }}',
            				user: '{{ myuser }}',
					        admin: '{{ myadmin }}',
            				category: '{{ mycategory }}'
        			},
				success: function(msg) {
				
				},
				error: function(err) {
					$('#script-warning').show();
				}
			},
			loading: function(bool) {

				off = $('#calendar').offset(); 
				$('#loading').toggle(bool);

			},
    		eventDidMount: function(info) {
				
				start = new Date(info.event.start);
				end = new Date(info.event.end); 
				desc = '<br><br>' + info.event.extendedProps.desc;
				if(info.event.extendedProps.desc == null)  desc = '';
				if(info.event.extendedProps.desc == '')  desc = '';
				stop = '<br> <b>do</b> ' + end.format("yyyy-mm-dd HH:MM");
				if(info.event.end == null) stop = "";
				
				cont = '<div style="font-size:12px"><b>' + info.event.title + '</b>' +  desc + '</div><div style="font-size:11px;line-height:14px"><br><b>od</b> ' + start.format("yyyy-mm-dd HH:MM") + stop + '</div>';
		
				if(info.view.type == "dayGridMonth")
	    		$(info.el).qtip({content: cont,style: 'qtip-my'});
    			}
		});
		calendar.render();
	

	});

</script>
